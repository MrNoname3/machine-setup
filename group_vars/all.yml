---
# Shared variables for all hosts.

# The primary login user (sudo, SSH key, ownership, paths, ...). Defaults to
# whoever runs the playbook (runs are local); override per host in
# host_vars/<host>/local.yml if it ever differs.
primary_user: "{{ lookup('env', 'USER') }}"

# Directory holding the IoT/device SSH keys + config (OneDrive-synced, same path
# on both hosts). Used by the keyring role.
ssh_keys_dir: "/home/{{ primary_user }}/SynologyDrive/OneDrive/IOT/SSH"

# Packages to ensure are installed (used by the base role).
packages_present:
  - git
  - htop
  - vlc
  - kate
  - keepassxc
  - meld
  - numlockx                     # turn NumLock on at the LightDM greeter / boot

# Packages to ensure are removed. Keep entries here permanently so fresh
# installs stay clean. Never list a package in both lists.
packages_absent:
  # Browser / mail — using Brave + webmail
  - firefox
  - firefox-locale-en
  - thunderbird
  - thunderbird-locale-en
  - thunderbird-locale-en-us
  # Redundant / unused Mint default apps
  - celluloid                   # Mint video player (VLC is the default now)
  - hypnotix                    # Mint IPTV/TV player
  - warpinator                  # Mint LAN file transfer (we have Synology/SMB)
  - rhythmbox                   # music player (VLC covers it)
  - rhythmbox-data
  - rhythmbox-plugins
  - rhythmbox-plugin-tray-icon
  - pix                         # image organiser (xviewer stays as the viewer)
  - pix-data
  - sticky                      # sticky notes
  # Accessibility — not needed; brltty also hijacks USB-serial devices (bad for embedded dev)
  - onboard
  - onboard-common
  - orca
  - brltty
  - xbrlapi
  - mousetweaks
  # Misc unused apps (the panel clock/calendar is a Cinnamon applet, not gnome-calendar)
  - gnome-calendar
  - neofetch                    # cosmetic system-info printer
  - thingy                      # Mint document manager
  - mintchat                    # Mint community chat integration
  # Apple iOS device support (no Apple devices) + Mint welcome + char map
  - ideviceinstaller
  - ifuse
  - mintwelcome
  - gucharmap
  # Legacy network clients
  - telnet
  - inetutils-telnet
  - ftp
  - tnftp
  - rdate
  # Document Viewer — Brave handles PDFs; Nemo preview keeps the xreader libs
  - xreader
  - xreader-dbg
  # Mint default text editor — replaced by Kate as the default editor
  - xed
  - xed-dbg
  # Fingerprint auth — no fingerprint reader on this laptop; not active in PAM
  - fingwit
  - libpam-fingwit
  - fprintd
  - libpam-fprintd
