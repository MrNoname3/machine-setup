name: CI

# Runs on both GitHub Actions and Gitea Actions. Gitea also scans
# .github/workflows, and this job uses no actions/cache and no github-only
# guard, so it runs cleanly on either platform.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up ansible-lint + collections (in a venv)
        run: |
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet --upgrade pip
          /tmp/venv/bin/pip install --quiet ansible-lint
          /tmp/venv/bin/ansible-galaxy collection install -r requirements.yml

      - name: Syntax check
        run: /tmp/venv/bin/ansible-playbook --syntax-check -i inventory.ini site.yml

      - name: ansible-lint
        run: /tmp/venv/bin/ansible-lint
