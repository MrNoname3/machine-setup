name: CI

# Runs on both GitHub Actions and Gitea Actions. Gitea also scans
# .github/workflows, and this job uses no actions/cache and no github-only
# guard, so it runs cleanly on either platform.
#
# The job just calls the release gate — the same script developers run locally
# (./scripts/check.sh) — so local green means CI green, by construction.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: these jobs only read the repository. Without this block the
# GITHUB_TOKEN inherits the repository default, which may be read-write.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # a hung step (e.g. a stalled pip/galaxy download) fails fast instead of idling
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run the release gate (same script as local runs)
        run: ./scripts/check.sh
