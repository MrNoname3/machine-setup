[defaults]
inventory = inventory.ini
roles_path = roles
# Repo-local collections (installed by scripts/ensure-venv.sh; path is relative
# to the repo root, where every documented command runs from).
collections_path = .ansible/collections
host_key_checking = False
# YAML-formatted task output. The old `yaml` stdout callback (community.general)
# was removed in community.general 12; the built-in default callback with
# result_format=yaml is the supported replacement (ansible-core >= 2.13).
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent
# Run on the local machine by default; no SSH back to self.
# Normal entry point: ./scripts/apply.sh <host> [extra args] (repo-local venv).
