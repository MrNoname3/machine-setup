[defaults]
inventory = inventory.ini
roles_path = roles
host_key_checking = False
# YAML-formatted task output. The old `yaml` stdout callback (community.general)
# was removed in community.general 12; the built-in default callback with
# result_format=yaml is the supported replacement (ansible-core >= 2.13).
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent
# Run on the local machine by default; no SSH back to self.
# Override per run with: ansible-playbook -c local -l <host> -K site.yml
