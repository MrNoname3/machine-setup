---
# luks-unlock role: remote unlock via dropbear in the initramfs (over SSH).
# Networking is configured via the kernel ip= parameter (the documented
# dropbear-initramfs method), and the USB ethernet driver is force-loaded early
# so the slow USB link (~6s) is up before DHCP. The unlock still requires the
# LUKS passphrase (typed via cryptroot-unlock). Only PUBLIC keys live in the repo.

- name: Install dropbear-initramfs
  ansible.builtin.apt:
    name: dropbear-initramfs
    state: present
  when: ansible_os_family == "Debian"

- name: Ensure the dropbear initramfs config directory exists
  ansible.builtin.file:
    path: /etc/dropbear/initramfs
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Authorize the unlock SSH key for dropbear (initramfs)
  ansible.builtin.copy:
    src: laptop.pub
    dest: /etc/dropbear/initramfs/authorized_keys
    owner: root
    group: root
    mode: "0600"
  notify: Rebuild initramfs

- name: Remove the old conf.d IP setting (superseded by the kernel ip= parameter)
  ansible.builtin.file:
    path: /etc/initramfs-tools/conf.d/dropbear-ip
    state: absent
  notify: Rebuild initramfs

- name: Force-load the wired-network drivers early in the initramfs
  ansible.builtin.lineinfile:
    path: /etc/initramfs-tools/modules
    line: "{{ item }}"
    create: true
    mode: "0644"
  loop:
    - usbnet
    - ax88179_178a
  notify: Rebuild initramfs

- name: Enable initramfs networking (DHCP) via the kernel cmdline
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX="(?!.*ip=dhcp).*?)"$'
    replace: '\1ip=dhcp"'
  notify: Update grub
  when: ansible_os_family == "Debian"

