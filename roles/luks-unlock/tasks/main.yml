---
# luks-unlock role: additional LUKS unlock methods beyond the install passphrase.
# Implemented: remote unlock via dropbear in the initramfs (over SSH).
# The unlock still requires the LUKS passphrase (typed via cryptroot-unlock);
# the SSH key only authorizes the connection. Only PUBLIC keys live in the repo.

- name: Install dropbear-initramfs
  ansible.builtin.apt:
    name: dropbear-initramfs
    state: present
  when: ansible_os_family == "Debian"

- name: Ensure the dropbear initramfs config directory exists
  ansible.builtin.file:
    path: /etc/dropbear/initramfs
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Authorize the unlock SSH key for dropbear (initramfs)
  ansible.builtin.copy:
    src: laptop.pub
    dest: /etc/dropbear/initramfs/authorized_keys
    owner: root
    group: root
    mode: "0600"
  notify: Rebuild initramfs

- name: Bring up networking in the initramfs (DHCP over the wired adapter)
  ansible.builtin.copy:
    dest: /etc/initramfs-tools/conf.d/dropbear-ip
    content: "IP=dhcp\n"
    owner: root
    group: root
    mode: "0644"
  notify: Rebuild initramfs

