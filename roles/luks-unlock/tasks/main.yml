---
# luks-unlock role: remote unlock via dropbear in the initramfs (over SSH).
# Networking is configured via the kernel ip= parameter (the documented
# dropbear-initramfs method) over the built-in ethernet port; the NIC driver is
# in the stock initramfs (MODULES=most), no special handling needed. The unlock
# still requires the LUKS passphrase (typed via cryptroot-unlock). Only PUBLIC
# keys live in the repo.

- name: Install dropbear-initramfs
  ansible.builtin.apt:
    name: dropbear-initramfs
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: Ensure the dropbear initramfs config directory exists
  ansible.builtin.file:
    path: /etc/dropbear/initramfs
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Authorize the unlock SSH key for dropbear (initramfs)
  ansible.builtin.copy:
    src: laptop.pub
    dest: /etc/dropbear/initramfs/authorized_keys
    owner: root
    group: root
    mode: "0600"
  notify: Rebuild initramfs

- name: Remove the old conf.d IP setting (superseded by the kernel ip= parameter)
  ansible.builtin.file:
    path: /etc/initramfs-tools/conf.d/dropbear-ip
    state: absent
  notify: Rebuild initramfs

# The machine used to unlock over a USB-ethernet adapter whose slow link needed
# its drivers force-loaded early; the adapter is gone (built-in port now), so
# clean those lines up wherever they still exist.
- name: Remove the legacy USB-ethernet force-load from the initramfs
  ansible.builtin.lineinfile:
    path: /etc/initramfs-tools/modules
    line: "{{ item }}"
    state: absent
  loop:
    - usbnet
    - ax88179_178a
  notify: Rebuild initramfs

- name: Enable initramfs networking (DHCP) via the kernel cmdline
  # The unlock IP is pinned by a DHCP reservation on the router (MAC -> fixed
  # address), so the initramfs and the booted system both get the same address.
  # Keeping ip=dhcp here is generic and interface-agnostic.
  # NOTE: the router reservation is an external dependency, not in this repo.
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX='
    line: 'GRUB_CMDLINE_LINUX="ip=dhcp"'
  notify: Update grub
  when: ansible_facts['os_family'] == "Debian"

# Out of scope (see README.md): the secondary HDD auto-unlock is handled by the
# storage role; a pendrive-keyfile unlock for the root was considered and parked.
