---
# Synology Drive Client is distributed only as a vendor .deb (not in apt).
# To update: pick the latest from
#   https://archive.synology.com/download/Utility/SynologyDriveClient
# and bump version + build below (the URL is derived from them).
synology_drive_version: "4.0.3-17892"
synology_drive_build: "17892"
synology_drive_url: "https://global.synologydownload.com/download/Utility/SynologyDriveClient/{{ synology_drive_version }}/Ubuntu/Installer/synology-drive-client-{{ synology_drive_build }}.x86_64.deb"

# Bind-mount Synology Drive subfolders onto the home XDG directories, mirroring
# the desktop's /etc/fstab. Sources live under the synced ~/SynologyDrive (on the
# encrypted root for now); 'nofail' keeps boot resilient if a folder is missing.
synology_home: "/home/{{ primary_user }}"
synology_binds:
  - { src: "SynologyDrive/OneDrive/Desktop", path: "Desktop" }
  - { src: "SynologyDrive/OneDrive/Documents", path: "Documents" }
  - { src: "SynologyDrive/Downloads", path: "Downloads" }
  - { src: "SynologyDrive/OneDrive/Music", path: "Music" }
  - { src: "SynologyDrive/OneDrive/Pictures", path: "Pictures" }
