---
# synology-drive role: Synology Drive Client + bind mounts of the synced
# subfolders onto the home XDG directories.
#
# Install per OS:
#   - Mint: official .deb (below) — not available in apt.
#   - Bazzite: the com.synology.SynologyDrive flatpak, managed by the flatpaks
#     role (host list). Its autostart entry is created by the client itself via
#     the flatpak autostart portal — we do not manage it (same reasoning as the
#     Mint branch: two entries would appear).
# The sync gate + bind mounts below are common to both hosts.

- name: Discover the latest Synology Drive Client version from the archive
  ansible.builtin.uri:
    url: https://archive.synology.com/download/Utility/SynologyDriveClient
    return_content: true
  register: syno_archive
  failed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Select the newest version and build (falls back to the pinned default)
  ansible.builtin.set_fact:
    synology_drive_version: "{{ _vers | community.general.version_sort | last }}"
    synology_drive_build: "{{ (_vers | community.general.version_sort | last).split('-')[1] }}"
  vars:
    _vers: "{{ (syno_archive.content | default('')) | regex_findall('SynologyDriveClient/([0-9.]+-[0-9]+)') | unique }}"
  when:
    - ansible_facts['os_family'] == "Debian"
    - _vers | length > 0

- name: Download the Synology Drive Client .deb
  ansible.builtin.get_url:
    url: "{{ synology_drive_url }}"
    dest: "/var/cache/synology-drive-client-{{ synology_drive_build }}.deb"
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: Install the Synology Drive Client
  ansible.builtin.apt:
    deb: "/var/cache/synology-drive-client-{{ synology_drive_build }}.deb"
  when: ansible_facts['os_family'] == "Debian"

# Autostart is handled by the client itself: with "launch on startup" enabled
# (the default after setup), it creates ~/.config/autostart/
# synology-drive-autostart.desktop -> /opt/Synology/... which runs
# `synology-drive autostart` (tray, no window). So we do NOT add our own entry —
# it would show up twice in Startup Applications. This removes any our-managed
# entry left over from earlier versions of this role.
- name: Remove our redundant Synology autostart entry (the client manages its own)
  ansible.builtin.file:
    path: "/home/{{ primary_user }}/.config/autostart/synology-drive.desktop"
    state: absent
  become: false
  when: ansible_facts['os_family'] == "Debian"

# --- Manual gate ----------------------------------------------------------
# Everything below this point (the Synology subfolder mounts into $HOME, added
# later) depends on the client being set up and the initial sync finished.
# We pause ONLY when the sync folder is missing, so on a converged machine the
# folder already exists and re-runs pass straight through (changed=0, no prompt).
# The folder appears as soon as a sync task is configured, so the human waits at
# THIS pause on first run and presses Enter once the initial sync has finished.
- name: Check whether the Synology Drive sync folder exists
  ansible.builtin.stat:
    path: "/home/{{ primary_user }}/SynologyDrive"
  register: syno_sync
  become: false

- name: Gate — wait for Synology Drive setup and initial sync
  ansible.builtin.pause:
    prompt: |
      Synology Drive is not set up yet (no ~/SynologyDrive folder).
      Open Synology Drive, log in, pick the sync folder, and WAIT for the
      initial sync to finish. Press Enter to continue once it is done.
  when: not syno_sync.stat.exists

# --- Synology subfolder bind mounts (mirror the desktop's /etc/fstab) ------
# Map the synced Synology subfolders onto the home XDG dirs. The home dirs must
# be empty (a bind hides any existing content). We stat each source first and
# mount only the ones that exist, so a partial sync (some subfolders missing,
# or no ~/SynologyDrive at all) can never fail the run. Idempotent:
# ansible.posix.mount manages the fstab entry and mounts it now.
- name: Check which Synology bind sources exist
  ansible.builtin.stat:
    path: "{{ synology_home }}/{{ item.src }}"
  loop: "{{ synology_binds }}"
  loop_control:
    label: "{{ item.src }}"
  register: synology_bind_sources
  become: false

# On Bazzite the binds are keyed by the canonical /var/home path (see
# synology_home in that host's vars): /home is a symlink there and /proc/mounts
# shows the resolved path, so /home-keyed entries would never register as
# mounted. Drop any legacy /home-keyed lines once (needs root -> -K); when none
# are left, the grep finds nothing and re-runs stay root-free.
- name: Look for legacy /home-keyed Synology bind lines in fstab
  ansible.builtin.command: grep -c "^/home/{{ primary_user }}/SynologyDrive" /etc/fstab
  register: synology_legacy_lines
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] != "Debian"

- name: Drop the legacy /home-keyed bind lines (superseded by /var/home keys)
  ansible.posix.mount:
    path: "/home/{{ primary_user }}/{{ item.path }}"
    state: absent_from_fstab
  loop: "{{ synology_binds }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - ansible_facts['os_family'] != "Debian"
    - (synology_legacy_lines.stdout | default('0') | int) > 0

# Common to both hosts (the list mirrors what both fstabs should hold). One-time
# fstab writes need root -> run with -K; afterwards it converges without root.
#
# Deliberately NOT state=mounted: the module cannot reliably detect an active
# bind mount whose source lives on a btrfs subvolume (the desktop) and would
# re-mount — stacking a new bind layer — on every run. So the module only
# manages the fstab line, and the mounted-ness is checked with findmnt below
# (layer-agnostic); an actual mount call only happens when the target is not
# mounted at all, which after a boot is never.
- name: Ensure the Synology bind-mount entries in fstab
  ansible.posix.mount:
    src: "{{ synology_home }}/{{ item.item.src }}"
    path: "{{ synology_home }}/{{ item.item.path }}"
    fstype: none
    opts: bind,nofail,x-gvfs-hide
    state: present
  loop: "{{ synology_bind_sources.results | selectattr('stat.exists') | list }}"
  loop_control:
    label: "{{ item.item.path }}"

- name: Check which bind targets are currently mounted
  ansible.builtin.command: "findmnt --mountpoint {{ synology_home }}/{{ item.item.path }}"
  register: synology_mount_state
  changed_when: false
  failed_when: false
  become: false
  loop: "{{ synology_bind_sources.results | selectattr('stat.exists') | list }}"
  loop_control:
    label: "{{ item.item.path }}"

# noqa'd: using the mount MODULE here is exactly what we avoid (see above).
- name: Mount any bind target that is not mounted yet # noqa: command-instead-of-module
  ansible.builtin.command: "mount {{ synology_home }}/{{ item.item.item.path }}"
  changed_when: true # guarded below: runs only for unmounted targets
  loop: "{{ synology_mount_state.results | rejectattr('rc', 'eq', 0) | list }}"
  loop_control:
    label: "{{ item.item.item.path }}"
