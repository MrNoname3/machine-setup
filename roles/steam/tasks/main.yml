---
# steam role: install Steam (needs i386 multiarch, already enabled) and
# autostart it minimised to the tray on login.

- name: Install Steam
  ansible.builtin.apt:
    name: steam-installer
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Autostart Steam on login (silent / tray)
  ansible.builtin.copy:
    dest: "/home/{{ primary_user }}/.config/autostart/steam.desktop"
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=Steam
      Exec=steam -silent
      Categories=Game;
      X-GNOME-Autostart-enabled=true
      Hidden=false
  become: false
  when: ansible_os_family == "Debian"

# --- Manual gate ----------------------------------------------------------
# Steam stores logged-in accounts in loginusers.vdf, created on first sign-in.
# Pause ONLY while that file is missing, so a logged-in machine passes through
# unprompted (changed=0). Steps that depend on Steam being signed in go below.
- name: Check whether Steam has a logged-in account
  ansible.builtin.stat:
    path: "/home/{{ primary_user }}/.steam/steam/config/loginusers.vdf"
  register: steam_login
  become: false

- name: Gate — sign in to Steam
  ansible.builtin.pause:
    prompt: |
      Steam is not signed in yet (no loginusers.vdf).
      Launch Steam, sign in to your account, then press Enter to continue.
  when: not steam_login.stat.exists
