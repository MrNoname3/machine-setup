---
# steam role: install Steam (needs i386 multiarch, already enabled) and
# autostart it minimised to the tray on login.

- name: Install Steam
  ansible.builtin.apt:
    name: steam-installer
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install Steam-related Flatpak apps (ProtonPlus, etc.)
  community.general.flatpak:
    name: "{{ steam_flatpaks }}"
    remote: flathub
    method: system
    state: present
  when: steam_flatpaks | length > 0

- name: Autostart Steam on login (silent / tray)
  ansible.builtin.copy:
    dest: "/home/{{ primary_user }}/.config/autostart/steam.desktop"
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=Steam
      Exec=steam -silent
      Categories=Game;
      X-GNOME-Autostart-enabled=true
      Hidden=false
  become: false
  when: ansible_facts['os_family'] == "Debian"

# Bazzite ships Steam in the image (no install task); it is launched through the
# /usr/bin/bazzite-steam wrapper (gamescope/session integration), so the
# autostart entry differs from the Mint one.
- name: Autostart Steam on login (silent / tray, Bazzite wrapper)
  ansible.builtin.copy:
    dest: "/home/{{ primary_user }}/.config/autostart/steam.desktop"
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=Steam
      Exec=/usr/bin/bazzite-steam -silent %U
      Icon=steam
      Categories=Network;FileTransfer;Game;
      Terminal=false
  become: false
  when: ansible_facts['os_family'] != "Debian"

# ProtonPlus is a GTK4/libadwaita app; on the laptop's old iGPU the default
# NGL renderer stutters, and the old GL renderer measurably helps (the rest of
# the residual window-drag lag is Cinnamon compositing the large GTK4 shadow
# surface — not fixable app-side). Modern-GPU hosts don't need the override.
- name: Use the old GL renderer for ProtonPlus (flatpak override)
  community.general.ini_file:
    path: "/home/{{ primary_user }}/.local/share/flatpak/overrides/com.vysp3r.ProtonPlus"
    section: Environment
    option: GSK_RENDERER
    value: gl
    no_extra_spaces: true
    mode: "0644"
  become: false
  when: ansible_facts['os_family'] == "Debian"

# --- Manual gate ----------------------------------------------------------
# Steam stores logged-in accounts in loginusers.vdf, created on first sign-in.
# Pause ONLY while that file is missing, so a logged-in machine passes through
# unprompted (changed=0). Steps that depend on Steam being signed in go below.
- name: Check whether Steam has a logged-in account
  ansible.builtin.stat:
    path: "/home/{{ primary_user }}/.steam/steam/config/loginusers.vdf"
  register: steam_login
  become: false

- name: Gate — sign in to Steam
  ansible.builtin.pause:
    prompt: |
      Steam is not signed in yet (no loginusers.vdf).
      Launch Steam, sign in to your account, then press Enter to continue.
  when: not steam_login.stat.exists
