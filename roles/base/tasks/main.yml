---
# Base role: package management and common configuration.
# apt tasks are guarded so this role is safe to include on non-Debian hosts
# (e.g. the immutable Bazzite desktop, which uses rpm-ostree instead).

- name: Passwordless sudo for the primary user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ primary_user }}-nopasswd"
    content: "{{ primary_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Install packages (apt)
  ansible.builtin.apt:
    name: "{{ packages_present }}"
    state: present
    update_cache: true
  when:
    - ansible_os_family == "Debian"
    - packages_present | length > 0

- name: Remove packages (apt)
  ansible.builtin.apt:
    name: "{{ packages_absent }}"
    state: absent
    purge: true
    autoremove: true
  when:
    - ansible_os_family == "Debian"
    - packages_absent | length > 0

# NumLock on by default. Running numlockx at the LightDM greeter turns it on
# at the login screen, and that X keyboard state carries into the Cinnamon
# session (csd-keyboard's numlock-state is 'unknown', so it doesn't undo it).
- name: Enable NumLock at the LightDM greeter (persists into the session)
  community.general.ini_file:
    path: /etc/lightdm/lightdm.conf
    section: "Seat:*"
    option: greeter-setup-script
    value: /usr/bin/numlockx on
    mode: "0644"
    no_extra_spaces: true
  when: ansible_os_family == "Debian"

- name: Set VLC as the default video player (user MIME associations)
  community.general.ini_file:
    path: "/home/{{ primary_user }}/.config/mimeapps.list"
    section: Default Applications
    option: "{{ item }}"
    value: "{{ default_video_player }}"
    mode: "0644"
    no_extra_spaces: true
  become: false
  loop: "{{ video_mimetypes }}"
  when: ansible_os_family == "Debian"

# Don't put mounted-volume icons on the Cinnamon desktop (an internal fixed
# disk like /mnt/hdd showing up there is unwanted). Volumes still appear in the
# Nemo sidebar and in Disk Usage Analyzer (the data disk uses x-gvfs-show).
- name: Hide mounted-volume icons from the Cinnamon desktop
  community.general.dconf:
    key: /org/nemo/desktop/volumes-visible
    value: "false"
    state: present
  become: false
  when: ansible_os_family == "Debian"

# Default Nemo view: list, sorted by name ascending -- everywhere EXCEPT folders
# where a view was set by hand. ignore-view-metadata=false makes Nemo honour each
# folder's saved per-folder view, so manual overrides stick; inherit-folder-viewer
# =false means new folders use this global default rather than the parent's view.
- name: Default Nemo to list view sorted by name ascending (manual per-folder overrides respected)
  community.general.dconf:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
  become: false
  loop:
    - { key: /org/nemo/preferences/default-folder-viewer, value: "'list-view'" }
    - { key: /org/nemo/preferences/default-sort-order, value: "'name'" }
    - { key: /org/nemo/preferences/default-sort-in-reverse-order, value: "false" }
    - { key: /org/nemo/preferences/ignore-view-metadata, value: "false" }
    - { key: /org/nemo/preferences/inherit-folder-viewer, value: "false" }
  when: ansible_os_family == "Debian"
