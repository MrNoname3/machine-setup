---
# Default video player (XDG MIME associations in the user's mimeapps.list).
default_video_player: vlc.desktop
video_mimetypes:
  - video/mp4
  - video/x-matroska
  - video/x-msvideo
  - video/quicktime
  - video/webm
  - video/mpeg
  - video/x-ms-wmv
  - video/x-flv
  - video/3gpp
  - video/3gpp2
  - video/x-m4v
  - video/ogg
  - video/mp2t
  - video/x-ms-asf
  - video/dv
  - video/x-ogm+ogg
  - video/x-theora+ogg

# CUPS printers to configure (base role). Empty by default; define per host in
# host_vars/<host>/main.yml. The USB device URI (which carries the unit's serial)
# is not stored here — the role discovers it at run time from `lpinfo -v` by
# matching `usb_match` against the reported usb:// URIs, so nothing machine-
# specific lands in the repo. Each item:
#   name           CUPS queue name (e.g. Samsung-SCX-4x21-Series)
#   usb_match      substring/regex matched against `lpinfo -v` usb:// URIs
#   model          CUPS -m driver spec (a drv:/// PPD or a .ppd path)
#   model_nickname expected PPD nickname prefix, used for the idempotency check
printers: []

# Default text editor (Kate) for text/source MIME types.
default_text_editor: org.kde.kate.desktop
text_mimetypes:
  - text/plain
  - application/x-zerosize          # empty files (xed handled these too)
  - text/markdown
  - text/x-python
  - text/x-python3
  - application/json
  - text/xml
  - application/xml
  - text/x-shellscript
  - application/x-shellscript
  - text/x-csrc
  - text/x-c++src
  - text/x-chdr
  - text/css
  - text/x-log
  - text/csv
  - application/yaml
  - application/x-yaml
  - text/x-java
