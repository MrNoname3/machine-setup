---
# vscode role: install VS Code from the Microsoft apt repo (on Mint; the
# Bazzite flatpak comes from the flatpaks role), then deploy the user's
# settings and extension set to whichever variant the host runs.

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts['os_family'] == "Debian"

- name: Download the Microsoft signing key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: Dearmor the Microsoft signing key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes -o /usr/share/keyrings/microsoft-vscode.gpg /etc/apt/keyrings/microsoft.asc
    creates: /usr/share/keyrings/microsoft-vscode.gpg
  when: ansible_facts['os_family'] == "Debian"

# deb822 .sources form (apt_repository is deprecated, removed in core 2.25).
# The install task below refreshes the apt cache, so a changed repo file is
# picked up without a separate update task.
- name: Add the VS Code apt repository (deb822)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/vscode.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://packages.microsoft.com/repos/code
      Suites: stable
      Components: main
      Architectures: amd64 arm64 armhf
      Signed-By: /usr/share/keyrings/microsoft-vscode.gpg
  when: ansible_facts['os_family'] == "Debian"

- name: Remove the legacy one-line vscode.list (superseded by vscode.sources)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vscode.list
    state: absent
  when: ansible_facts['os_family'] == "Debian"

- name: Install VS Code
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Debian"

# The SAME settings.json (colour theme "Dark Modern", editor prefs, ...) is the
# source of truth for both hosts — only the destination differs: native config
# dir on Mint, the flatpak's app dir on Bazzite (VS Code itself is installed by
# the flatpaks role there).
- name: Ensure the VS Code user config directory exists
  ansible.builtin.file:
    path: "/home/{{ primary_user }}/.config/Code/User"
    state: directory
    mode: "0755"
  become: false
  when: ansible_facts['os_family'] == "Debian"

- name: Deploy VS Code user settings
  ansible.builtin.copy:
    src: settings.json
    dest: "/home/{{ primary_user }}/.config/Code/User/settings.json"
    mode: "0644"
  become: false
  when: ansible_facts['os_family'] == "Debian"

- name: Ensure the VS Code (flatpak) user config directory exists
  ansible.builtin.file:
    path: "/home/{{ primary_user }}/.var/app/com.visualstudio.code/config/Code/User"
    state: directory
    mode: "0755"
  become: false
  when: ansible_facts['os_family'] != "Debian"

- name: Deploy VS Code user settings (flatpak)
  ansible.builtin.copy:
    src: settings.json
    dest: "/home/{{ primary_user }}/.var/app/com.visualstudio.code/config/Code/User/settings.json"
    mode: "0644"
  become: false
  when: ansible_facts['os_family'] != "Debian"

# The extension list is additive (extras installed by hand are left alone) and
# the extensions self-update in-app on both hosts; only the `code` CLI wrapping
# differs. On Bazzite the flatpak's CLI is reached via `flatpak run --command`.
- name: List installed VS Code extensions
  ansible.builtin.command: code --list-extensions
  become: false
  changed_when: false
  register: vscode_installed
  when: ansible_facts['os_family'] == "Debian"

- name: Install VS Code extensions
  ansible.builtin.command: "code --install-extension {{ item }}"
  become: false
  loop: "{{ vscode_extensions }}"
  when:
    - ansible_facts['os_family'] == "Debian"
    - item not in (vscode_installed.stdout_lines | default([]))
  changed_when: true

- name: List installed VS Code extensions (flatpak)
  ansible.builtin.command: >-
    flatpak run --command=code com.visualstudio.code --list-extensions
  become: false
  changed_when: false
  register: vscode_flatpak_installed
  when: ansible_facts['os_family'] != "Debian"

- name: Install VS Code extensions (flatpak)
  ansible.builtin.command: >-
    flatpak run --command=code com.visualstudio.code --install-extension {{ item }}
  become: false
  loop: "{{ vscode_extensions }}"
  when:
    - ansible_facts['os_family'] != "Debian"
    - item not in (vscode_flatpak_installed.stdout_lines | default([]))
  changed_when: true
