---
# brave role: install the Brave browser from the vendor's official repository —
# apt on Mint, rpm-ostree layering on Bazzite. The policy / MIME / local-pref /
# sync-gate tasks further down are OS-independent (Brave reads
# /etc/brave/policies on Fedora the same way).

- name: Download the Brave apt signing key
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: Add the Brave apt repository
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser.sources
    dest: /etc/apt/sources.list.d/brave-browser-release.sources
    mode: "0644"
  register: brave_repo
  when: ansible_facts['os_family'] == "Debian"

# Not a handler on purpose: the refreshed cache must exist BEFORE the install
# task below, and handlers only run at the end of the play.
- name: Update apt cache after adding the Brave repository # noqa: no-handler
  ansible.builtin.apt:
    update_cache: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - brave_repo.changed

- name: Install the Brave browser
  ansible.builtin.apt:
    name: brave-browser
    state: present
  when: ansible_facts['os_family'] == "Debian"

# --- Bazzite: vendor rpm repo + rpm-ostree layering ------------------------
# Layering changes the next deployment: after a fresh install a REBOOT is
# needed before the browser exists. --idempotent makes re-runs safe, and the
# status check below keeps converged runs green without root.
- name: Add the Brave rpm repository (Bazzite)
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/brave-browser.repo
    mode: "0644"
    content: |
      [brave-browser]
      name=Brave Browser
      enabled=1
      gpgcheck=1
      gpgkey=https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
      baseurl=https://brave-browser-rpm-release.s3.brave.com/$basearch
  when: ansible_facts['os_family'] != "Debian"

- name: Check whether brave-browser is already layered
  ansible.builtin.command: rpm-ostree status
  register: ostree_status
  changed_when: false
  become: false
  when: ansible_facts['os_family'] != "Debian"

- name: Layer the Brave browser (rpm-ostree; takes effect after a reboot)
  ansible.builtin.command: rpm-ostree install --idempotent brave-browser
  changed_when: true # guarded below: runs only when not layered yet
  when:
    - ansible_facts['os_family'] != "Debian"
    - "'brave-browser' not in ostree_status.stdout"

- name: Ensure the Brave policy directories exist
  ansible.builtin.file:
    path: "/etc/brave/policies/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - managed
    - recommended

- name: Deploy Brave policies (managed = enforced, recommended = editable defaults)
  ansible.builtin.copy:
    dest: "/etc/brave/policies/{{ item.level }}/brave.json"
    content: "{{ item.policies | to_nice_json }}"
    mode: "0644"
    validate: "python3 -m json.tool %s"
  loop:
    - { level: managed, policies: "{{ brave_policies }}" }
    - { level: recommended, policies: "{{ brave_policies_recommended }}" }
  loop_control:
    label: "{{ item.level }}"

- name: Set Brave as the default handler for web pages and PDFs (user MIME associations)
  community.general.ini_file:
    path: "/home/{{ primary_user }}/.config/mimeapps.list"
    section: Default Applications
    option: "{{ item }}"
    value: brave-browser.desktop
    mode: "0644"
    no_extra_spaces: true
  become: false
  loop:
    - x-scheme-handler/http
    - x-scheme-handler/https
    - text/html
    - x-scheme-handler/about
    - x-scheme-handler/unknown
    - application/pdf

# --- Local (non-syncing) preferences --------------------------------------
# These have no managed-policy equivalent, so we edit only the specific dotted
# keys in the relevant JSON file, leaving the rest intact. Most live in the
# profile's Preferences; a few (e.g. Widevine opt-in) live in the browser-wide
# Local State. Brave rewrites both on exit, so we skip the edit while it runs.
- name: Check whether Brave is currently running
  ansible.builtin.command: pgrep -x brave
  register: brave_running
  changed_when: false
  failed_when: false
  become: false

- name: Apply Brave local preferences (Preferences + Local State)
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json, os, sys
        path, desired = sys.argv[1], json.loads(sys.argv[2])
        if not os.path.exists(path):
            print('OK'); sys.exit(0)
        with open(path) as f:
            prefs = json.load(f)
        MISS = object()
        def current(node, dotted):
            for part in dotted.split('.'):
                if not isinstance(node, dict) or part not in node:
                    return MISS
                node = node[part]
            return node
        def assign(node, dotted, value):
            parts = dotted.split('.')
            for part in parts[:-1]:
                node = node.setdefault(part, {})
            node[parts[-1]] = value
        changed = False
        for key, value in desired.items():
            if current(prefs, key) != value:
                assign(prefs, key, value)
                changed = True
        if changed:
            with open(path, 'w') as f:
                json.dump(prefs, f, separators=(',', ':'))
        print('CHANGED' if changed else 'OK')
      - "{{ item.path }}"
      - "{{ item.prefs | to_json }}"
  register: brave_local_prefs_result
  changed_when: "'CHANGED' in brave_local_prefs_result.stdout"
  become: false
  when: brave_running.rc != 0
  loop:
    - { path: "{{ brave_prefs_path }}", prefs: "{{ brave_local_prefs }}" }
    - { path: "{{ brave_local_state_path }}", prefs: "{{ brave_local_state_prefs }}" }
  loop_control:
    label: "{{ item.path | basename }}"

- name: Warn that local prefs were skipped because Brave is running
  ansible.builtin.debug:
    msg: >-
      Brave is running, so the local preferences (appearance, NTP cards,
      Widevine, etc.) were not applied. Close Brave and re-run to apply them.
  when: brave_running.rc == 0

# --- Manual gate ----------------------------------------------------------
# A configured Brave sync chain stores its seed under brave_sync_v2.seed in the
# profile's Preferences (absent until you join/create a chain). We pause ONLY
# while that seed is missing, so once sync is set up, re-runs pass through
# unprompted (changed=0). If Brave's key ever changes, adjust the path below.
# Steps that depend on the synced profile go below this gate.
- name: Check whether Brave is joined to a sync chain (seed present)
  ansible.builtin.command:
    cmd: >
      python3 -c "import json,sys;
      p='/home/{{ primary_user }}/.config/BraveSoftware/Brave-Browser/Default/Preferences';
      d=json.load(open(p));
      sys.exit(0 if d.get('brave_sync_v2',{}).get('seed') else 1)"
  register: brave_sync
  failed_when: false
  changed_when: false
  become: false

- name: Gate — set up the Brave sync chain
  ansible.builtin.pause:
    prompt: |
      Brave is not joined to a sync chain yet.
      Open Brave, set up Sync (enter or create your sync code), then press
      Enter to continue once the profile has synced.
  when: brave_sync.rc != 0
