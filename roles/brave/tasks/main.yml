---
# brave role: install the Brave browser from its official apt repository.
# Idempotent translation of the vendor's documented setup steps.

- name: Download the Brave apt signing key
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: "0644"

- name: Add the Brave apt repository
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser.sources
    dest: /etc/apt/sources.list.d/brave-browser-release.sources
    mode: "0644"
  register: brave_repo

- name: Update apt cache after adding the Brave repository
  ansible.builtin.apt:
    update_cache: true
  when: brave_repo.changed

- name: Install the Brave browser
  ansible.builtin.apt:
    name: brave-browser
    state: present

- name: Ensure the Brave managed-policy directory exists
  ansible.builtin.file:
    path: /etc/brave/policies/managed
    state: directory
    mode: "0755"

- name: Deploy Brave managed policies
  ansible.builtin.copy:
    dest: /etc/brave/policies/managed/brave.json
    content: "{{ brave_policies | to_nice_json }}"
    mode: "0644"
    validate: "python3 -m json.tool %s"

- name: Set Brave as the default handler for web pages and PDFs (user MIME associations)
  community.general.ini_file:
    path: "/home/{{ primary_user }}/.config/mimeapps.list"
    section: Default Applications
    option: "{{ item }}"
    value: brave-browser.desktop
    mode: "0644"
    no_extra_spaces: true
  become: false
  loop:
    - x-scheme-handler/http
    - x-scheme-handler/https
    - text/html
    - x-scheme-handler/about
    - x-scheme-handler/unknown
    - application/pdf

# --- Local (non-syncing) preferences --------------------------------------
# These have no managed-policy equivalent, so we edit only the specific dotted
# keys in the profile's Preferences JSON, leaving the rest of the file intact.
# Brave rewrites Preferences on exit, so we skip the edit while it is running.
- name: Check whether Brave is currently running
  ansible.builtin.command: pgrep -x brave
  register: brave_running
  changed_when: false
  failed_when: false
  become: false

- name: Apply Brave local preferences (wide address bar, hidden NTP cards)
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json, os, sys
        path, desired = sys.argv[1], json.loads(sys.argv[2])
        if not os.path.exists(path):
            print('OK'); sys.exit(0)
        with open(path) as f:
            prefs = json.load(f)
        MISS = object()
        def current(node, dotted):
            for part in dotted.split('.'):
                if not isinstance(node, dict) or part not in node:
                    return MISS
                node = node[part]
            return node
        def assign(node, dotted, value):
            parts = dotted.split('.')
            for part in parts[:-1]:
                node = node.setdefault(part, {})
            node[parts[-1]] = value
        changed = False
        for key, value in desired.items():
            if current(prefs, key) != value:
                assign(prefs, key, value)
                changed = True
        if changed:
            with open(path, 'w') as f:
                json.dump(prefs, f, separators=(',', ':'))
        print('CHANGED' if changed else 'OK')
      - "{{ brave_prefs_path }}"
      - "{{ brave_local_prefs | to_json }}"
  register: brave_local_prefs_result
  changed_when: "'CHANGED' in brave_local_prefs_result.stdout"
  become: false
  when: brave_running.rc != 0

- name: Warn that local prefs were skipped because Brave is running
  ansible.builtin.debug:
    msg: >-
      Brave is running, so the local preferences (wide address bar, hidden
      News/Talk cards) were not applied. Close Brave and re-run to apply them.
  when: brave_running.rc == 0

# --- Manual gate ----------------------------------------------------------
# A configured Brave sync chain stores its seed under brave_sync_v2.seed in the
# profile's Preferences (absent until you join/create a chain). We pause ONLY
# while that seed is missing, so once sync is set up, re-runs pass through
# unprompted (changed=0). If Brave's key ever changes, adjust the path below.
# Steps that depend on the synced profile go below this gate.
- name: Check whether Brave is joined to a sync chain (seed present)
  ansible.builtin.command:
    cmd: >
      python3 -c "import json,sys;
      p='/home/{{ primary_user }}/.config/BraveSoftware/Brave-Browser/Default/Preferences';
      d=json.load(open(p));
      sys.exit(0 if d.get('brave_sync_v2',{}).get('seed') else 1)"
  register: brave_sync
  failed_when: false
  changed_when: false
  become: false

- name: Gate — set up the Brave sync chain
  ansible.builtin.pause:
    prompt: |
      Brave is not joined to a sync chain yet.
      Open Brave, set up Sync (enter or create your sync code), then press
      Enter to continue once the profile has synced.
  when: brave_sync.rc != 0
