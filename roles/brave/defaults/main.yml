---
# Brave policies — mirror the desktop's NON-syncing settings.
# MANDATORY (enforced) policies go to /etc/brave/policies/managed/brave.json.
# Idempotent (we manage only these files, never Brave's Preferences directly).
# Verify the applied result in the browser at brave://policy.
brave_policies:
  # Privacy
  MetricsReportingEnabled: false
  BackgroundModeEnabled: false
  # NOTE: "clear data on exit" is configured via local prefs (the
  # browser.clear_data.*_on_exit keys below), NOT policy, because the desired
  # on-exit set includes a Brave-specific type (Leo AI) that the
  # ClearBrowsingDataOnExitList policy enum cannot express.

  # Debloat — fully disabled. Tor is intentionally left untouched (user uses it).
  BraveRewardsDisabled: true
  BraveWalletDisabled: true
  BraveVPNDisabled: true
  BraveAIChatEnabled: false

# RECOMMENDED policies go to /etc/brave/policies/recommended/brave.json: they
# pre-set a default but leave the UI editable. The default search engine lives
# here (not mandatory) so the Search settings page — including the private-window
# search selector — stays visible/changeable instead of being locked/hidden.
brave_policies_recommended:
  DefaultSearchProviderEnabled: true
  DefaultSearchProviderName: DuckDuckGo
  DefaultSearchProviderSearchURL: "https://duckduckgo.com/?q={searchTerms}"
  DefaultSearchProviderSuggestURL: "https://ac.duckduckgo.com/ac/?q={searchTerms}&type=list"

# Local (non-syncing) profile preferences that have no policy equivalent.
# Applied idempotently by editing only these dotted keys in the profile's
# Preferences JSON, and only while Brave is closed (it rewrites the file on
# exit). Mirrors the desktop. Verified key names from the desktop's Preferences.
brave_prefs_path: "/home/{{ primary_user }}/.config/BraveSoftware/Brave-Browser/Default/Preferences"
brave_local_prefs:
  # Appearance
  brave.location_bar_is_wide: true            # wide URL/address bar
  omnibox.prevent_url_elisions: true          # always show full URLs
  brave.web_view_rounded_corners: false       # no rounded corners on main content areas

  # New-tab page cards
  brave.new_tab_page.show_brave_news: false   # hide the News card
  brave.new_tab_page.show_together: false     # hide the Talk card (internal name: "together")

  # Social media blocking (Shields) — block all
  brave.fb_embed_default: false               # Facebook
  brave.twitter_embed_default: false          # X / Twitter
  brave.linkedin_embed_default: false         # LinkedIn

  # Telemetry off
  brave.p3a.enabled: false                    # privacy-preserving product analytics (P3A)
  brave.stats.reporting_enabled: false        # daily usage ping to Brave

  # "Delete browsing data" dialog defaults (Advanced tab)
  browser.clear_data.browsing_history: true
  browser.clear_data.cookies: false
  browser.clear_data.cache: true              # cached images and files
  browser.clear_data.download_history: true
  browser.clear_data.form_data: true          # autofill form data
  browser.clear_data.hosted_apps_data: true
  browser.clear_data.brave_leo: true          # Leo AI
  browser.clear_data.site_settings: false     # site and shields settings

  # "Clear data on exit" — same set as above
  browser.clear_data.browsing_history_on_exit: true
  browser.clear_data.cookies_on_exit: false
  browser.clear_data.cache_on_exit: true
  browser.clear_data.download_history_on_exit: true
  browser.clear_data.form_data_on_exit: true
  browser.clear_data.hosted_apps_data_on_exit: true
  browser.clear_data.brave_leo_on_exit: true
  browser.clear_data.site_settings_on_exit: false

  # Media Router / casting off
  media_router.enable_media_router: false
  brave.enable_media_router_on_restart: false

  # Don't warn before closing a window with multiple tabs
  brave.enable_window_closing_confirm: false

# Browser-wide preferences that live in "Local State" (NOT the per-profile
# Preferences). Applied by the same idempotent task as brave_local_prefs.
brave_local_state_path: "/home/{{ primary_user }}/.config/BraveSoftware/Brave-Browser/Local State"
brave_local_state_prefs:
  # Enable Widevine (streaming DRM). Brave downloads the CDM on first launch.
  brave.widevine_opted_in: true
