---
# graphics role: NVIDIA GT 520M (Fermi) + Intel HD 3000, Optimus laptop.
#
# Implemented: disable the phantom NVIDIA VGA output. The dGPU's analog VGA
# connector is not physically routed, so it floats and is wrongly reported
# "connected", making the desktop extend onto a non-existent monitor. Force it
# off at the kernel level via the GRUB cmdline (video=VGA-1:d).

- name: Disable the phantom NVIDIA VGA output via the kernel cmdline
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="(?!.*video=VGA-1:d).*?)"$'
    replace: '\1 video=VGA-1:d"'
  notify: Update grub
  when: ansible_os_family == "Debian"

