---
# containers role: rootless Podman set up to behave like Docker + Distrobox.
# subuid/subgid are already present on this host; the tasks below are idempotent.

# The only rootless precondition we don't enforce with a package: unprivileged
# user namespaces. Ubuntu 24.04 enables them by default, but it also ships an
# AppArmor restriction toggle -- so assert early with a clear message rather than
# letting Podman fail cryptically later.
- name: Check unprivileged user namespaces (rootless precondition)
  ansible.builtin.command: unshare --user --map-root-user true
  changed_when: false
  failed_when: false
  register: userns_check
  when: ansible_facts['os_family'] == "Debian"

- name: Require unprivileged user namespaces for rootless Podman
  ansible.builtin.assert:
    that: userns_check.rc == 0
    fail_msg: >-
      Unprivileged user namespaces are unavailable (`unshare --user` failed).
      Rootless Podman needs them. On Ubuntu check the sysctls
      kernel.apparmor_restrict_unprivileged_userns and
      kernel.unprivileged_userns_clone.
    success_msg: Unprivileged user namespaces available.
  when: ansible_facts['os_family'] == "Debian"

- name: Install Podman + Distrobox + rootless/Docker-compat stack
  ansible.builtin.apt:
    name: "{{ container_packages }}"
    state: present
    update_cache: true
    # docker-compose-v2 Recommends docker.io; without this that pulls the whole
    # real Docker engine back in (it is in packages_absent). Every rootless dep we
    # actually need is listed explicitly in container_packages, so skipping
    # recommends loses nothing.
    install_recommends: false
  when:
    - ansible_facts['os_family'] == "Debian"
    - container_packages | length > 0

- name: Add or remove the docker CLI alias (podman-docker) per toggle
  ansible.builtin.apt:
    name: podman-docker
    state: "{{ 'present' if container_docker_cli else 'absent' }}"
    purge: true
  when: ansible_facts['os_family'] == "Debian"

- name: Ensure subuid range for the primary user (rootless)
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ primary_user }}:"
    line: "{{ primary_user }}:100000:65536"
    create: true
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: Ensure subgid range for the primary user (rootless)
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ primary_user }}:"
    line: "{{ primary_user }}:100000:65536"
    create: true
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: Ensure the registries drop-in directory exists
  ansible.builtin.file:
    path: /etc/containers/registries.conf.d
    state: directory
    mode: "0755"
  when: ansible_facts['os_family'] == "Debian"

- name: Make Podman search Docker Hub for unqualified images (Docker-like)
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf.d/99-docker-like.conf
    mode: "0644"
    content: |
      # Managed by Ansible (containers role). Mirrors Fedora/Bazzite so that
      # `podman run nginx` pulls from Docker Hub like Docker does.
      unqualified-search-registries = {{ container_search_registries | to_json }}
      short-name-mode = "permissive"
  when: ansible_facts['os_family'] == "Debian"

# DOCKER_HOST export — opt-in (see container_docker_host_export in defaults).
# OFF by default so it never hijacks a real rootful Docker daemon's `docker` CLI;
# the paired removal task cleans it up on hosts where the toggle is off.
- name: Point Docker-API clients at the rootless Podman socket (DOCKER_HOST)
  ansible.builtin.copy:
    dest: /etc/profile.d/99-docker-host.sh
    mode: "0644"
    content: |
      # Managed by Ansible (containers role). Lets docker compose v2 / IDE docker
      # plugins / testcontainers reach the rootless Podman socket.
      export DOCKER_HOST="unix:///run/user/$(id -u)/podman/podman.sock"
  when:
    - ansible_facts['os_family'] == "Debian"
    - container_docker_host_export | default(false) | bool

- name: Remove the DOCKER_HOST export when not opted in (protect a rootful Docker)
  ansible.builtin.file:
    path: /etc/profile.d/99-docker-host.sh
    state: absent
  when:
    - ansible_facts['os_family'] == "Debian"
    - not (container_docker_host_export | default(false) | bool)

- name: Enable lingering so the rootless Podman socket runs without an active login
  ansible.builtin.command: "loginctl enable-linger {{ primary_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ primary_user }}"
  when: ansible_facts['os_family'] == "Debian"

- name: Look up the primary user's UID
  ansible.builtin.command: "id -u {{ primary_user }}"
  register: primary_uid
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Enable + start the rootless Podman API socket (user service)
  ansible.builtin.command: >-
    sudo -u {{ primary_user }} XDG_RUNTIME_DIR=/run/user/{{ primary_uid.stdout }}
    systemctl --user enable --now podman.socket
  register: podman_socket
  changed_when: "'Created symlink' in (podman_socket.stderr + podman_socket.stdout)"
  when: ansible_facts['os_family'] == "Debian"

# ===========================================================================
# Bazzite: the image ships the whole Podman stack (podman, netavark,
# aardvark-dns, distrobox), so there is nothing to install — only the user
# services need wiring. Runs as the user (the playbook is applied with
# become=false on this host).
# ===========================================================================
- name: Rootless Podman user services (Bazzite)
  when: ansible_facts['os_family'] != "Debian"
  become: false
  block:

    - name: Enable lingering so the rootless Podman socket runs without an active login
      ansible.builtin.command: "loginctl enable-linger {{ primary_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ primary_user }}"

    - name: Enable + start the rootless Podman API socket
      ansible.builtin.systemd_service:
        name: podman.socket
        scope: user
        enabled: true
        state: started

    # This is what makes `--restart=always/unless-stopped` containers come back
    # after a reboot (Docker-like behaviour; Podman has no daemon to do it).
    - name: Enable the podman-restart service (restart-policy containers at boot)
      ansible.builtin.systemd_service:
        name: podman-restart.service
        scope: user
        enabled: true
