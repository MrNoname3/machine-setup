---
# keyring role: use KeePassXC as the SSH agent (and, later, the system keyring).
#
# Both hosts get the same USER-VISIBLE outcome — SSH keys served from KeePassXC,
# aliases work, a locked database blocks SSH — via OS-appropriate mechanisms:
#
#   - Bazzite (Fedora-atomic / KDE): KeePassXC is a *flatpak*; it loads keys into
#     the per-user systemd ssh-agent.socket (SSH_AUTH_SOCK pinned via a flatpak
#     override so the sandbox always finds it).
#   - Mint (Debian / Cinnamon): KeePassXC is a *native apt* package, and the
#     SYSTEM'S OWN agent chain is used, untouched: pam_gnome_keyring exports
#     SSH_AUTH_SOCK=/run/user/<uid>/keyring/ssh, which gnome-keyring 46 serves as
#     a proxy in front of a REAL OpenSSH ssh-agent child. The only gap is that
#     this child agent has no DISPLAY/askpass, so "Require user confirmation"
#     keys fail ("agent refused operation"). One user-level systemd drop-in on
#     gnome-keyring-daemon.service fixes that — no SSH_AUTH_SOCK overrides
#     anywhere (KeePassXC and ssh both use the session default), so there is no
#     race to lose. gnome-keyring stays fully intact (Secret Service included).
#
# Shared, OS-independent bits (idempotent, user-level unless noted):
#   - ~/.ssh (0700) + ~/.ssh/control (0700, ssh ControlMaster sockets).
#   - Symlink ~/.ssh/config -> {{ ssh_keys_dir }}/config, enforce 0600.
#   - Generate a .pub for any private key still on disk (normally a no-op:
#     post-phase-2 the keys live only in KeePassXC; the .pub files arrive via the
#     OneDrive sync).
#   - Reproduce keepassxc.ini (keepassxc_ini_settings) + the XDG autostart entry.
#
# NOT reproduced on purpose: the [KeeShare] block (per-install private key).
# The ssh config *content* (IdentityFile -> .pub, ControlMaster/ControlPersist)
# lives in the OneDrive-synced file; this role only links it and fixes perms.
#
# Manual one-time steps it CANNOT do (secret handling lives in the GUI):
#   - Enable "SSH Agent integration" (if the seeded ini didn't take) and add each
#     private key to an entry (attachment) with "Add to agent when unlocked" /
#     "Remove when locked". If the same .kdbx is synced across machines, opening
#     it on the second machine already carries these per-entry settings.

# ===========================================================================
# Fedora-atomic / KDE host (Bazzite): KeePassXC flatpak -> systemd ssh-agent
# ===========================================================================
- name: KeePassXC SSH agent (Fedora-atomic / KDE)
  # Bazzite reports ansible_facts['os_family'] == "Bazzite" (uBlue sets its own os-release
  # ID), not "RedHat" — so we branch on "not Debian".
  when: ansible_facts['os_family'] != "Debian"
  become: false # user-scoped by default; only the flatpak install escalates
  vars:
    ssh_dir: "/home/{{ primary_user }}/.ssh"
    kp_app: org.keepassxc.KeePassXC
    kp_ini: "/home/{{ primary_user }}/.var/app/org.keepassxc.KeePassXC/config/keepassxc/keepassxc.ini"
    kp_proxy_path: /var/lib/flatpak/exports/bin/org.keepassxc.KeePassXC # flatpak wrapper
  block:

    - name: Check whether the KeePassXC flatpak is installed (any scope)
      ansible.builtin.command: "flatpak info {{ kp_app }}"
      register: keyring_kp_info
      changed_when: false
      failed_when: false

    - name: Install KeePassXC (system flatpak from Flathub)
      # Only needed on a fresh machine; run the playbook with -K for this one.
      community.general.flatpak:
        name: "{{ kp_app }}"
        remote: flathub
        method: system
        state: present
      become: true
      when: keyring_kp_info.rc != 0

    - name: Ensure ~/.ssh and ~/.ssh/control exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ ssh_dir }}"
        - "{{ ssh_dir }}/control"

    - name: Link ~/.ssh/config to the OneDrive-synced ssh config
      ansible.builtin.file:
        src: "{{ ssh_keys_dir }}/config"
        dest: "{{ ssh_dir }}/config"
        state: link
        force: true

    - name: Enforce 0600 on the ssh config file
      ansible.builtin.file:
        path: "{{ ssh_keys_dir }}/config"
        mode: "0600"

    - name: Find private keys still present in the SSH key directory
      ansible.builtin.find:
        paths: "{{ ssh_keys_dir }}"
        file_type: file
        excludes: ["*.pub", "*.ppk", "config", "*config", "*known_hosts*"]
      register: keyring_private_keys

    - name: Generate a public key (.pub) for every private key
      ansible.builtin.shell:
        cmd: "ssh-keygen -y -P '' -f {{ item.path | quote }} > {{ (item.path ~ '.pub') | quote }}"
        creates: "{{ item.path }}.pub"
      loop: "{{ keyring_private_keys.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Enable the per-user SSH agent socket (boot-persistent)
      ansible.builtin.systemd_service:
        name: ssh-agent.socket
        scope: user
        enabled: true
        state: started

    - name: Ensure the KeePassXC config directory exists
      ansible.builtin.file:
        path: "{{ kp_ini | dirname }}"
        state: directory
        mode: "0700"

    - name: Reproduce KeePassXC settings (keepassxc.ini)
      community.general.ini_file:
        path: "{{ kp_ini }}"
        section: "{{ item.section }}"
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        no_extra_spaces: true
        mode: "0600"
      loop: "{{ keepassxc_ini_settings }}"
      loop_control:
        label: "{{ item.section }}/{{ item.option }}"

    - name: Look up the primary user's UID (for the runtime socket path)
      ansible.builtin.command: "id -u {{ primary_user }}"
      register: keyring_uid
      changed_when: false

    - name: Read the current KeePassXC flatpak overrides
      ansible.builtin.command: "flatpak override --user --show {{ kp_app }}"
      register: keyring_kp_overrides
      changed_when: false

    - name: Pin SSH_AUTH_SOCK for the KeePassXC flatpak (robust against launch env)
      # The flatpak's default ssh-auth socket only wires SSH_AUTH_SOCK when the
      # launching process already has it; pin the real agent socket so KeePassXC
      # always finds it. Assumes the runtime dir is /run/user/<uid>.
      ansible.builtin.command:
        cmd: >-
          flatpak override --user
          --env=SSH_AUTH_SOCK=/run/user/{{ keyring_uid.stdout }}/ssh-agent.socket
          --filesystem=xdg-run/ssh-agent.socket
          {{ kp_app }}
      changed_when: true # the when-guard below already limits this to a missing override
      when: >-
        ('SSH_AUTH_SOCK=/run/user/' ~ keyring_uid.stdout ~ '/ssh-agent.socket')
        not in keyring_kp_overrides.stdout

    - name: Ensure ~/.config/autostart exists
      ansible.builtin.file:
        path: "/home/{{ primary_user }}/.config/autostart"
        state: directory
        mode: "0755"

    - name: Autostart KeePassXC at login (flatpak)
      ansible.builtin.copy:
        dest: "/home/{{ primary_user }}/.config/autostart/{{ kp_app }}.desktop"
        mode: "0644"
        content: |
          [Desktop Entry]
          Type=Application
          Name={{ kp_app }}
          X-XDP-Autostart={{ kp_app }}
          Exec=flatpak run {{ kp_app }}
          X-Flatpak={{ kp_app }}

    - name: Ensure the Brave native-messaging host directory exists
      ansible.builtin.file:
        path: "/home/{{ primary_user }}/.config/BraveSoftware/Brave-Browser/NativeMessagingHosts"
        state: directory
        mode: "0755"

    - name: Enable KeePassXC browser integration for Brave (native-messaging manifest)
      ansible.builtin.copy:
        dest: "/home/{{ primary_user }}/.config/BraveSoftware/Brave-Browser/NativeMessagingHosts/org.keepassxc.keepassxc_browser.json"
        mode: "0644"
        content: "{{ (keepassxc_browser_manifest | combine({'path': kp_proxy_path})) | to_nice_json }}\n"

# ===========================================================================
# Debian / Mint host (Cinnamon): native KeePassXC -> gnome-keyring ssh agent
# ===========================================================================
- name: KeePassXC SSH agent (Debian / Mint)
  when: ansible_facts['os_family'] == "Debian"
  become: false # user-scoped by default; only the apt install escalates
  vars:
    ssh_dir: "/home/{{ primary_user }}/.ssh"
    kp_ini: "/home/{{ primary_user }}/.config/keepassxc/keepassxc.ini"
    kp_proxy_path: /usr/bin/keepassxc-proxy # native proxy binary
  block:

    - name: Install KeePassXC + ssh-askpass (apt)
      ansible.builtin.apt:
        name:
          - keepassxc
          - ssh-askpass-gnome # GUI askpass for ssh-agent key-use confirmation
        state: present
      become: true

    - name: Ensure ~/.ssh and ~/.ssh/control exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ ssh_dir }}"
        - "{{ ssh_dir }}/control"

    - name: Link ~/.ssh/config to the OneDrive-synced ssh config
      ansible.builtin.file:
        src: "{{ ssh_keys_dir }}/config"
        dest: "{{ ssh_dir }}/config"
        state: link
        force: true

    - name: Enforce 0600 on the ssh config file
      ansible.builtin.file:
        path: "{{ ssh_keys_dir }}/config"
        mode: "0600"

    - name: Find private keys still present in the SSH key directory
      ansible.builtin.find:
        paths: "{{ ssh_keys_dir }}"
        file_type: file
        excludes: ["*.pub", "*.ppk", "config", "*config", "*known_hosts*"]
      register: keyring_private_keys

    - name: Generate a public key (.pub) for every private key
      ansible.builtin.shell:
        cmd: "ssh-keygen -y -P '' -f {{ item.path | quote }} > {{ (item.path ~ '.pub') | quote }}"
        creates: "{{ item.path }}.pub"
      loop: "{{ keyring_private_keys.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    # --- Native agent chain. gnome-keyring 46 wraps a REAL OpenSSH ssh-agent:
    # SSH_AUTH_SOCK=/run/user/<uid>/keyring/ssh (exported by pam_gnome_keyring) is
    # a proxy served by gnome-keyring-daemon, which forwards to a real
    # /usr/bin/ssh-agent child on the hidden /run/user/<uid>/keyring/.ssh socket.
    # The ONLY missing piece is that this child agent inherits no DISPLAY/askpass,
    # so "Require user confirmation" keys fail ("agent refused operation").
    # Fix: a user-level systemd drop-in giving gnome-keyring-daemon (and thus its
    # agent child) the askpass env. No SSH_AUTH_SOCK overrides anywhere — we ride
    # the system's own export, so there is nothing to race with. Verified on a
    # clean boot: RSA + confirm keys sign, the confirmation dialog pops.
    - name: Ensure the gnome-keyring-daemon drop-in directory exists
      ansible.builtin.file:
        path: "/home/{{ primary_user }}/.config/systemd/user/gnome-keyring-daemon.service.d"
        state: directory
        mode: "0755"

    - name: Give gnome-keyring's internal ssh-agent askpass capability (drop-in)
      # Takes effect at the next login (the daemon spawns its agent child lazily).
      # DISPLAY is pinned (single-seat X11 = :0) because the daemon starts before
      # the session exports it.
      ansible.builtin.copy:
        dest: "/home/{{ primary_user }}/.config/systemd/user/gnome-keyring-daemon.service.d/ssh-askpass.conf"
        mode: "0644"
        content: |
          # Give gnome-keyring's internal OpenSSH ssh-agent (child process, serves
          # /run/user/<uid>/keyring/.ssh behind the /keyring/ssh proxy) the ability to pop
          # an askpass dialog for "confirm before use" keys. Without DISPLAY the agent
          # refuses to sign with confirm-constrained keys.
          [Service]
          Environment=SSH_ASKPASS=/usr/bin/ssh-askpass
          Environment=SSH_ASKPASS_REQUIRE=force
          Environment=DISPLAY=:0
          Environment=XAUTHORITY=/home/{{ primary_user }}/.Xauthority
      register: keyring_gk_dropin

    # Not a handler on purpose: the reload belongs to this block's OS branch and
    # must not fire for the other OS; an immediate guarded task keeps that local.
    - name: Reload the user manager so it sees the drop-in # noqa: no-handler
      # Needed because lingering keeps user@<uid> alive across logouts: without a
      # reload the manager would restart gnome-keyring-daemon at the next login
      # from its CACHED (drop-in-less) unit definition until a full reboot.
      ansible.builtin.systemd_service:
        daemon_reload: true
        scope: user
      when: keyring_gk_dropin.changed

    - name: Ensure the KeePassXC config directory exists
      ansible.builtin.file:
        path: "{{ kp_ini | dirname }}"
        state: directory
        mode: "0700"

    - name: Reproduce KeePassXC settings (keepassxc.ini)
      community.general.ini_file:
        path: "{{ kp_ini }}"
        section: "{{ item.section }}"
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        no_extra_spaces: true
        mode: "0600"
      loop: "{{ keepassxc_ini_settings }}"
      loop_control:
        label: "{{ item.section }}/{{ item.option }}"

    # No AuthSockOverride for KeePassXC and no shell override: KeePassXC and ssh
    # both use the session's own SSH_AUTH_SOCK (gnome-keyring's), which now works
    # for every key type thanks to the drop-in above.

    - name: Ensure ~/.config/autostart exists
      ansible.builtin.file:
        path: "/home/{{ primary_user }}/.config/autostart"
        state: directory
        mode: "0755"

    - name: Autostart KeePassXC at login (native)
      ansible.builtin.copy:
        dest: "/home/{{ primary_user }}/.config/autostart/org.keepassxc.KeePassXC.desktop"
        mode: "0644"
        content: |
          [Desktop Entry]
          Type=Application
          Name=KeePassXC
          Exec=keepassxc
          Icon=keepassxc
          X-GNOME-Autostart-enabled=true

    - name: Ensure the Brave native-messaging host directory exists
      ansible.builtin.file:
        path: "/home/{{ primary_user }}/.config/BraveSoftware/Brave-Browser/NativeMessagingHosts"
        state: directory
        mode: "0755"

    - name: Enable KeePassXC browser integration for Brave (native-messaging manifest)
      ansible.builtin.copy:
        dest: "/home/{{ primary_user }}/.config/BraveSoftware/Brave-Browser/NativeMessagingHosts/org.keepassxc.keepassxc_browser.json"
        mode: "0644"
        content: "{{ (keepassxc_browser_manifest | combine({'path': kp_proxy_path})) | to_nice_json }}\n"
