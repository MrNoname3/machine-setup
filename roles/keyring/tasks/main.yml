---
# keyring role: use KeePassXC as the SSH agent (and, later, the system keyring).
#
# Status: the SSH-agent integration is implemented for the Fedora-atomic / KDE
# host (desktop-bazzite). The Debian/Mint path (disable gnome-keyring's Secret
# Service + SSH components and hand them to KeePassXC) is still TODO — see the
# bottom of this file and memory/old-laptop-linux-plan.md.
#
# Eventual full design (still the target for the keyring/Secret-Service half):
#   - Two databases: DB-A "system keyring" (key-file-only, auto-unlocks at
#     login, exposes a group over the Secret Service API for non-sensitive
#     system secrets) and DB-B "passwords" (password-protected, manual unlock,
#     holds personal passwords + browser integration + SSH keys).
#   - KeePassXC autostarts in the tray and reopens previous databases.
#
# What this role automates today (idempotent, user-level — no root needed):
#   1. ~/.ssh (0700) and ~/.ssh/control (0700, for ssh ControlMaster sockets).
#   2. Symlink ~/.ssh/config -> {{ ssh_keys_dir }}/config and enforce 0600 on it.
#   3. Generate a .pub next to any private key still in {{ ssh_keys_dir }}
#      (normally a no-op: post-phase-2 the private keys live only in KeePassXC,
#      and the .pub files arrive via the OneDrive sync).
#   4. Enable the per-user systemd ssh-agent.socket, so SSH_AUTH_SOCK points at
#      a stable, boot-persistent agent that KeePassXC can load keys into.
#   5. Turn on KeePassXC's "SSH Agent integration" (Agent + Enabled).
#
# The ssh config *content* (IdentityFile -> .pub, ControlMaster/ControlPersist
# multiplexing, host aliases) lives in the OneDrive-synced file, not here; this
# role only links it into ~/.ssh and fixes its permissions.
#
# Manual one-time steps it CANNOT do (secret handling lives in the GUI):
#   - Add each private key to a KeePassXC entry (as an attachment); on the
#     entry's "SSH Agent" tab tick "Add key to agent when database is unlocked"
#     and "Remove key from agent when database is locked". Optionally "Require
#     user confirmation" (per-use; the config's ControlPersist keeps it to one
#     prompt per active window).

# ---------------------------------------------------------------------------
# Fedora-atomic / KDE host (Bazzite): KeePassXC as the SSH agent
# ---------------------------------------------------------------------------
- name: KeePassXC SSH agent (Fedora-atomic / KDE)
  # Mirrors the repo's Mint guard (ansible_os_family == "Debian") from the other
  # side. NB: Bazzite reports ansible_os_family == "Bazzite" (uBlue sets its own
  # os-release ID), not "RedHat" — so we branch on "not Debian", not on RedHat.
  when: ansible_os_family != "Debian"
  become: false # everything here is user-scoped; no privilege escalation
  vars:
    ssh_dir: "/home/{{ primary_user }}/.ssh"
  block:

    - name: Ensure ~/.ssh and ~/.ssh/control exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ ssh_dir }}"
        - "{{ ssh_dir }}/control" # ControlMaster multiplexing sockets

    - name: Link ~/.ssh/config to the OneDrive-synced ssh config
      ansible.builtin.file:
        src: "{{ ssh_keys_dir }}/config"
        dest: "{{ ssh_dir }}/config"
        state: link
        force: true

    - name: Enforce 0600 on the ssh config file
      ansible.builtin.file:
        path: "{{ ssh_keys_dir }}/config"
        mode: "0600"

    - name: Find private keys still present in the SSH key directory
      ansible.builtin.find:
        paths: "{{ ssh_keys_dir }}"
        file_type: file
        excludes:
          - "*.pub" # already a public key
          - "*.ppk" # PuTTY format, not an OpenSSH private key
          - "config" # ssh client config
          - "*config" # e.g. RemoteSSH_config
          - "*known_hosts*"
      register: keyring_private_keys

    - name: Generate a public key (.pub) for every private key
      # ssh-keygen -y derives the public key from the private one. `creates`
      # makes this idempotent: existing .pub files are left untouched.
      ansible.builtin.shell:
        cmd: "ssh-keygen -y -P '' -f {{ item.path | quote }} > {{ (item.path ~ '.pub') | quote }}"
        creates: "{{ item.path }}.pub"
      loop: "{{ keyring_private_keys.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Enable the per-user SSH agent socket (boot-persistent)
      ansible.builtin.systemd_service:
        name: ssh-agent.socket
        scope: user
        enabled: true
        state: started

    - name: Enable KeePassXC's SSH Agent integration
      # KeePassXC (flatpak) inherits SSH_AUTH_SOCK and has the `ssh-auth` socket
      # permission, so once this is on it loads keys into the agent above.
      # NOTE: KeePassXC rewrites this file on exit; if it is running while this
      # task flips a value, close and reopen it (or set it once via the GUI:
      # Settings -> SSH Agent -> Enable SSH Agent integration).
      community.general.ini_file:
        path: "/home/{{ primary_user }}/.var/app/org.keepassxc.KeePassXC/config/keepassxc/keepassxc.ini"
        section: SSHAgent
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        no_extra_spaces: true
        mode: "0600"
      loop:
        - { option: Agent, value: "true" }
        - { option: Enabled, value: "true" }
      loop_control:
        label: "{{ item.option }}"

# ---------------------------------------------------------------------------
# Debian / Mint host: TODO (gnome-keyring handover) — not yet implemented
# ---------------------------------------------------------------------------
- name: keyring role — Debian/Mint path not yet implemented
  when: ansible_os_family == "Debian"
  ansible.builtin.debug:
    msg: >-
      TODO: disable gnome-keyring's Secret Service + SSH components and hand
      org.freedesktop.secrets / the SSH agent to KeePassXC.
      See: memory/old-laptop-linux-plan.md
