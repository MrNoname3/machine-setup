---
# Per-host settings for laptop-old.

# Roles to apply on this host (the "switch" for site.yml).
roles_enabled:
  - base
  - ssh-access
  - brave
  - synology-drive
  - steam
  - vscode
  - luks-unlock
  - graphics
  - firewall
# Built incrementally; uncomment each as it gets implemented:
#  - keyring

# The primary login user (used for sudo, SSH key, ownership, ...).
primary_user: REDACTED

# Hardened SSH port (socket activation is disabled so this takes effect).
ssh_port: REDACTED

# Remote LUKS unlock (dropbear) uses ip=dhcp; the address is pinned to
# REDACTED by a DHCP reservation on the router for the dock's USB ethernet
# MAC REDACTED (external dependency, not captured in this repo).

# --- LUKS / storage (fill in after install) ---
# luks_root_uuid: ""          # crypto_LUKS partition UUID on the SSD
# luks_hdd_uuid: ""           # crypto_LUKS partition UUID on the secondary HDD
# unlock_pendrive_uuid: ""    # filesystem UUID of the home unlock pendrive
