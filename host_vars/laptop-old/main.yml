---
# Per-host settings for laptop-old.
#
# Machine-local values (ssh_port, luks_hdd_uuid, wg_home_gateway_macs, and
# optionally primary_user) live in local.yml next to this file — untracked by
# git. If a value needed by an enabled role is missing, the playbook prompts
# for it once and saves it there (see the pre_tasks in site.yml).

# Roles to apply on this host (the "switch" for site.yml).
roles_enabled:
  - base
  - ssh-access
  - brave
  - synology-drive
  - steam
  - vscode
  - luks-unlock
  - graphics
  - firewall
  - storage
  - wireguard
  - containers
  - etckeeper
  - keyring

# CUPS printers (base role). The Samsung SCX-4x21 Series MFP is a Samsung QPDL
# device, so it must use splix's rastertoqpdl driver (PPD "Samsung SCX-4521F");
# the generic PCL-XL PPD the Mint dialog suggests prints nothing. The USB URI is
# auto-discovered from `lpinfo -v` (usb_match), so no serial is stored here.
printers:
  - name: Samsung-SCX-4x21-Series
    usb_match: "usb://Samsung/SCX-4x21"
    model: "drv:///splix-samsung.drv/scx4521f.ppd"
    model_nickname: "Samsung SCX-4521F"

# Podman is the only container engine here (no rootful Docker), so it is safe to
# export DOCKER_HOST to the rootless Podman socket for testcontainers / IDE
# docker plugins. NOT set on hosts that run a real Docker daemon (e.g. the
# desktop), where it would hijack the `docker` CLI.
container_docker_host_export: true

# Hardware video decode (VA-API): the Sandy Bridge iGPU decodes H.264 in
# hardware (verified with vainfo), but Brave ships it off by default on
# Linux, and the old i965 driver also needs the driver-check override.
# Verify in the browser at brave://gpu -> "Video Decode: Hardware accelerated".
brave_flags:
  - "--enable-features=VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks"

# Remote LUKS unlock (dropbear) uses ip=dhcp; the address is pinned by a DHCP
# reservation on the router (external dependency, not captured in this repo —
# details in local.yml).

# --- Machine-local values (see local.yml) ---
# ssh_port                      hardened SSH port
# luks_root_uuid                crypto_LUKS partition UUID on the SSD
# luks_hdd_uuid                 secondary HDD LUKS partition
# unlock_pendrive_uuid          filesystem UUID of the home unlock pendrive
# wg_home_gateway_macs          trusted home default-gateway MAC(s); if the AP
#                               routes its own subnet (not bridge mode), add
#                               its gateway MAC as well
