---
# Per-host settings for desktop-bazzite (Bazzite / Fedora atomic, KDE Plasma).
#
# Onboarded incrementally by reverse-engineering the live system (rpm-ostree
# layers, flatpak list, brew leaves, fstab, user services). Mint-centric role
# branches are guarded by ansible_os_family and skip here.

# Roles to apply on this host (the "switch" for site.yml).
roles_enabled:
  - brave           # rpm-ostree layered + policies/prefs (common tasks)
  - flatpaks        # the app set below
  - brew            # CLI tools below
  - synology-drive  # sync gate + home bind mounts (client via flatpaks)
  - steam           # autostart (Steam ships with the Bazzite image)
  - keyring         # KeePassXC as the SSH agent
  - kde             # Plasma tweaks + user services
  - containers      # rootless Podman user services (stack ships with the image)

# primary_user defaults to the running user (group_vars/all.yml); override in
# host_vars/desktop-bazzite/local.yml if it ever differs.

# Directory holding the IoT/device SSH private keys (OneDrive-synced).
# The keyring role generates a matching .pub next to every private key here.
ssh_keys_dir: "/home/{{ primary_user }}/SynologyDrive/OneDrive/IOT/SSH"

# Flatpak application set (system scope, Flathub). ProtonPlus is managed by the
# steam role (steam_flatpaks), so it is not repeated here.
flatpak_apps:
  # Documents / office / media
  - com.calibre_ebook.calibre
  - org.libreoffice.LibreOffice
  - org.kde.okular
  - org.kde.gwenview
  - org.kde.haruna
  - org.kde.kcalc
  - org.kde.filelight
  - org.videolan.VLC
  - org.gnome.meld
  # 3D printing / EDA / CAD
  - com.prusa3d.PrusaSlicer
  - org.freecad.FreeCAD
  - org.kicad.KiCad
  # Gaming (Steam itself ships with the image)
  - com.github.Matoking.protontricks
  - com.heroicgameslauncher.hgl
  - com.usebottles.bottles
  - io.github.unknownskl.greenlight
  # Flatpak / app management
  - com.github.tchx84.Flatseal
  - io.github.flattool.Warehouse
  - it.mijorus.gearlever
  - com.ranfdev.DistroShelf
  # Tools / infra
  - com.synology.SynologyDrive
  - com.visualstudio.code
  - org.keepassxc.KeePassXC
  - org.mozilla.firefox
  - org.virt_manager.virt-manager

# Homebrew CLI tools (leaves — dependencies follow automatically).
brew_packages:
  - flashrom
  - htop
  - midnight-commander
  - node
  - pipx
  - podman-compose
